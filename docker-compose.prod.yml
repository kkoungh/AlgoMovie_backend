services:
  caddy:
    image: caddy:2-alpine
    container_name: algomovie-caddy
    restart: unless-stopped
    environment:
      ALGOMOVIE_DOMAIN: ${ALGOMOVIE_DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api

  api:
    ports: !reset []
    expose:
      - "3000"
    environment:
      NODE_ENV: production

  recommend:
    ports: !reset []
    expose:
      - "8000"

  postgres:
    ports: !reset []
    expose:
      - "5432"

  redis:
    ports: !reset []
    expose:
      - "6379"

volumes:
  caddy_data:
  caddy_config:
